name: Deploy beta

# Auto-deploy to the beta droplet (beta.hirinews.com) on every push to main,
# or manually via the Actions tab ("Run workflow").
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once.
concurrency:
  group: deploy-beta
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync source to droplet
        run: |
          rsync -az --delete \
            --exclude='.git' --exclude='.github' --exclude='node_modules' \
            --exclude='.next' --exclude='.env' --exclude='.localdb' \
            --exclude='public/uploads' \
            --exclude='public/wp-content' \
            --exclude='.og-cache' \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/hirinews/"

      - name: Install, migrate, build, reload
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "bash /var/www/hirinews/scripts/deploy.sh"
